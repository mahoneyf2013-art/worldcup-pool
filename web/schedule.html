<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup Pool — Schedule</title><link rel="stylesheet" href="styles.css?v=8"><link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0f1720">
<meta name="description" content="Live, upcoming, and completed World Cup pool matches.">
<meta property="og:title" content="World Cup Pool — Schedule"><meta property="og:description" content="Live, upcoming, and completed World Cup pool matches."><meta property="og:type" content="website"><meta name="twitter:card" content="summary"></head>
<body><div id="nav"></div><div class="wrap">
<h1>Schedule</h1><div class="sub">Live, upcoming and completed matches.</div>
<div id="live"></div><div id="upcoming"></div><div id="done"></div>
</div>
<script src="app.js?v=8"></script><script>
document.getElementById("nav").innerHTML = navbar("schedule");
function teamLine(team, owner, score, win){
  return `<div class="tline${win?' win':''}">${teamLabel(team,owner)}<span class="sc">${score??""}</span></div>`;
}
function matchRow(m){
  const finished=m.status==="FINISHED", live=m.status==="LIVE", showScore=finished||live;
  const wa = m.winner ? m.winner===m.team_a : (finished && m.score_a>m.score_b);
  const wb = m.winner ? m.winner===m.team_b : (finished && m.score_b>m.score_a);
  const badge = live ? `<span class="badge b-LIVE">LIVE</span>`
     : finished ? `<span class="badge b-FINISHED">FT</span>`
     : `<span class="badge b-SCHEDULED">${m.round==='group'?'Group '+(m.grp||''):m.round}</span>`;
  const tv = m.network ? `<span class="tv">${m.network}</span>` : "";
  return `<div class="match smatch"><div class="rnd">${m.round==='group'?'GRP'+(m.grp?' '+m.grp:''):m.round}</div>
    <div class="mt">
      ${teamLine(m.team_a,m.owner_a,showScore?m.score_a:null,wa)}
      ${teamLine(m.team_b,m.owner_b,showScore?m.score_b:null,wb)}
      <div class="mtime">${etTime(m.kickoff)}${tv}</div>
    </div><div class="mbadge">${badge}</div></div>`;
}
function section(title,list){ if(!list.length) return "";
  return `<div class="sec">${title}</div><div class="card">${list.map(matchRow).join("")}</div>`; }
async function load(){
  let s; try{ s=await api("/api/schedule"); }catch(e){ document.getElementById("upcoming").innerHTML=`<div class="empty">${e.message}</div>`; return; }
  const live=s.filter(m=>m.status==="LIVE");
  const up=s.filter(m=>m.status==="SCHEDULED");
  const done=s.filter(m=>m.status==="FINISHED").reverse();
  document.getElementById("live").innerHTML=section("● Live now",live);
  document.getElementById("upcoming").innerHTML=section("Upcoming",up.slice(0,40));
  document.getElementById("done").innerHTML=section("Completed",done.slice(0,60));
}
window.__reload=load;
document.getElementById("upcoming").innerHTML=`<div class="sec">Upcoming</div>${skeletonCard(6)}`;
load();
</script></body></html>
